<!DOCTYPE html>
<html>
<head>
    <title>Artifix | Elephant Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <nav class="p-6 bg-slate-800 border-b border-red-500 flex justify-between">
        <h1 class="text-2xl font-bold tracking-tighter text-red-500">ARTIFIX MONITOR</h1>
        <div class="px-4 py-1 bg-green-500/20 text-green-400 rounded-full text-sm self-center">System Online</div>
    </nav>

    <div class="container mx-auto p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-black rounded-xl border border-slate-700 overflow-hidden shadow-2xl">
            <img src="{{ url_for('video_feed') }}" class="w-full">
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4">Security Dashboard</h2>
            <div class="space-y-4">
                <div class="bg-slate-700 p-4 rounded-lg">
                    <p class="text-xs text-gray-400 uppercase">Detection Status</p>
                    <p class="font-bold">Active: Searching for Elephants</p>
                </div>
                <div class="bg-red-500/10 p-4 rounded-lg border border-red-500/30">
                    <p class="text-xs text-red-400 uppercase">Alert Protocol</p>
                    <p class="text-sm italic">SMS alerts will be sent to forest range officers upon detection > 80% confidence.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
